# ========================================
# 공통 설정 (모든 프로파일에 적용)
# ========================================
spring:
  application:
    name: spring-library-system

  # 기본 프로파일: h2
  profiles:
    active: h2

  # JPA 공통 설정
  jpa:
    hibernate:
      ddl-auto: create-drop  # 프로파일별로 오버라이드 가능
    show-sql: true
    open-in-view: false  # OSIV 비활성화 - 성능 최적화 (Lazy Loading은 서비스 레이어에서 처리)
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        highlight_sql: true
        jdbc:
          batch_size: 20  # 배치 처리 최적화
        order_inserts: true
        order_updates: true
    defer-datasource-initialization: true

  # SQL 스크립트 실행 설정
  sql:
    init:
      mode: never  # 프로파일별로 오버라이드

# 로깅 설정
logging:
  level:
    com.example.library: DEBUG
    com.example.spring: INFO
    com.example.spring.aop.LoggingAspect: INFO
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.hibernate.orm.jdbc.bind: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# SpringDoc OpenAPI 설정
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true
  show-actuator: false
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

# 커스텀 설정
library:
  loan:
    default-period-weeks: 2
    max-renewal-count: 2
  notification:
    email:
      enabled: true
      from: library@example.com

# 서버 설정
server:
  port: 8080